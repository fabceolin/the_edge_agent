    severity: low
    finding: >-
      INT-011 (--show-graph interaction) is missing. AC-8 names
      --show-graph alongside --quiet and --stream; the test design lists
      INT-011 at P2 but it was not authored. Dev Agent Record notes
      "path-independence holds by construction" — plausible but unverified.
    suggested_action: >-
      Future, non-blocking: add a one-line invocation test mirroring
      INT-009/INT-010 for --show-graph.
  - id: "OBSERVATION-1"
    severity: low
    finding: >-
      Redundant auto_trace injection block in cli.py. Lines 1604-1631
      inject settings.auto_trace=true (loading the YAML to dict if
      merged_config is None); lines 1711-1720 then guard on
      "cli_trace_file is not None and merged_config is None" and load
      again — but merged_config is *always* non-None by that point when
      cli_trace_file is set. Harmless defensive duplication.
    suggested_action: >-
      Future, non-blocking cleanup: collapse the two auto_trace injection
      blocks into a single upstream block.

