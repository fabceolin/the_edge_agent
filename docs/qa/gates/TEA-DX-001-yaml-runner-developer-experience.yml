nfr_validation:
  security:
    status: PASS
    notes: >-
      Pre-implementation Security FAIL driven by Story 1.3 AC-4 (the
      non-existent `redact_state` pass) is resolved via Option B —
      `cli.py:2013-2020` emits a loud `WARNING:` banner the moment
      `--debug-state` is set, surviving `--quiet` (asserted by
      `test_int_warns_on_startup`); help text discloses the secrets
      risk. No traversal redaction is performed; intent (dev-only
      diagnostics) is documented. Path-traversal sanitization
      (`_safe_node_name` at `cli.py:2022-2028`) prevents node names
      from escaping the dump directory. Story 1.6's tea validate
      enforces an import allow-list in pure subprocess (1.6 UNIT-002)
      and a sentinel-file regression test (1.6 INT-006) — no
      yaml_engine / yaml_nodes / parallel* / actions / backends
      transitively imported during validation.
  performance:
    status: PASS
    notes: >-
      Every change is additive at config-load or per-node-event scale.
      Story 1.1 narrow `expand_env_vars` runs over ≤3 settings strings
      at engine init. Story 1.6 validator is O(nodes + edges); 500-node
      synthetic smoke comfortably under 5s budget. Story 1.7 heartbeat
      adds one stderr line per node-completion event; no engine change
      required. Story 1.3 dump path is a single JSON write per node —
      off the runtime hot path.
  reliability:
    status: PASS
    notes: >-
      Engine event taxonomy unblocked: Stories 1.3 and 1.7 hook
      `state` / `error` / `parallel_state` / `parallel_error` directly
      and synthesize timing deltas from monotonic clocks. AC-9 dump
      ordering for parallel blocks is asserted by the unit test
      `test_unit_dispatch_ignores_parallel_branch_events` — N-branch
      fan-out produces exactly two parent dumps. Story 1.6 validator/
      engine error parity locked by `TestRefactorParity` (3 scenarios
      green). All 14 `examples/yaml/*.yaml` smoke-load post-change;
      no regression in adjacent test suites (171 adjacent tests green
      around the validator extraction). Cross-suite Click 8.1 stderr
      contamination uncovered during YOLO pass and fixed at
      `test_cli_heartbeat.py::_make_runner` (now passes
      `mix_stderr=False` with TypeError fallback for Click ≥ 8.2).
  maintainability:
    status: CONCERNS
    notes: >-
      Six Epic NFR-ACs (snapshot test for `tea run --help` /
      `tea validate --help`, examples-yaml CI smoke gate, cross-story
      ordering enforcement, etc.) were not promoted from the NFR
      review into the epic story body. Their *intent* is satisfied by
      the dedicated test files (banner test, parallel-ordering test,
      validator/engine parity test, broken-fixture round-trip), but
      no contractual drift guard exists at the epic level. Acceptable
      tradeoff given the bundle is purely additive Python-only DX —
      future drift would surface in PR review rather than CI red.

