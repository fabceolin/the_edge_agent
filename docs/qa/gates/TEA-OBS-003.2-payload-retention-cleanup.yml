top_issues:
  - id: "DOC-SMOKE-001"
    severity: low
    finding: >-
      docs/python/observability.md is correct today (cron example carries
      explicit "NO redirect to /dev/null" comment, systemd timer present,
      TTL guidance leads with "30 days general; 7 days PII-heavy"), but
      no pytest assertion grep's the file. INT-017 / INT-018 / INT-019 /
      INT-020 from the test design were intended as fail-on-regression
      doc-smoke tests; they are not implemented. A future doc-cleanup
      PR could silently introduce >/dev/null 2>&1 or drift the warning
      text without breaking CI.
    suggested_action: >-
      Add python/tests/test_observability_docs.py with: (1) grep that
      cron fenced block does NOT contain any of `2>/dev/null`,
      `2>&1 >/dev/null`, `> /dev/null 2>&1`, `&>/dev/null`; (2) assert
      observability.md contains PII_RETENTION_WARNING verbatim (closes
      doc-parity gap below); (3) assert TTL guidance section contains
      literal "30 days" and "7 days" anchor strings. P2 / non-blocking.
    refs:
      - "docs/python/observability.md:201-235"
      - "docs/qa/assessments/TEA-OBS-003.2-test-design-20260501.md"
  - id: "MAINT-DUPLICATE-WARNING-001"
    severity: low
    finding: >-
      The retention WARNING string in yaml_engine.py:937-943 is a
      duplicate of PII_RETENTION_WARNING in trace_cleanup.py:38-43.
      The two copies are byte-identical today. test_retention_warning_fires
      pins the three required substrings (PII, trace_payload_retention_days,
      tea trace cleanup) so the absolute minimum guarantee holds, but
      verbatim text drift between the engine emission and the canonical
      constant is not caught.
    suggested_action: >-
      In yaml_engine.py:_configure_llm_payload_capture, replace the
      inline string with `from the_edge_agent.trace_cleanup import
      PII_RETENTION_WARNING; logger.warning(PII_RETENTION_WARNING)`.
      Single source of truth; doc-parity test (DOC-SMOKE-001 above)
      would then assert observability.md contains the same constant.
      P3 / non-blocking.
    refs:
      - "python/src/the_edge_agent/yaml_engine.py:937-943"
      - "python/src/the_edge_agent/trace_cleanup.py:38-43"
  - id: "TEST-FRAGILITY-001"
    severity: low
    finding: >-
      test_exit_1_on_deletion_failure (test_tea_obs003_payload.py:675-709)
      patches pathlib.Path.unlink globally via try/finally instead of
      pytest's monkeypatch fixture. Equivalent functional coverage; small
      fragility if the test crashes between the assignment and finally
      clause (very unlikely in practice).
    suggested_action: >-
      Switch to monkeypatch.setattr(_Path, "unlink", _failing_unlink) so
      pytest auto-reverts even on KeyboardInterrupt or hard fault. P3 /
      non-blocking.
    refs:
      - "python/tests/test_tea_obs003_payload.py:675-709"
  - id: "DRY-RUN-SNAPSHOT-001"
    severity: low
    finding: >-
      test_dry_run_deletes_nothing verifies the file still exists and
      result["dry_run"] == True. Test Design INT-009 specified a
      byte-identical filesystem snapshot (size+mtime+sha256) before vs
      after invocation as the strongest dry-run integrity assertion.
      Functional coverage adequate; defense-in-depth missing.
    suggested_action: >-
      Optional: add a _fs_snapshot(root) -> {Path: (size, mtime, sha256)}
      helper and assert before == after across the dry-run invocation.
      P3 / non-blocking.
    refs:
      - "python/tests/test_tea_obs003_payload.py:522-527"
  - id: "STDERR-FORMAT-001"
    severity: low
    finding: >-
      AC-13 stderr line format `ERROR: failed to delete <path>: <reason>`
      is emitted by the CLI (cli.py:3234-3237) but not asserted by
      test_exit_1_on_deletion_failure, which only checks exit_code == 1
      and file persistence. Compliance/log-search consumers may rely on
      this exact format.
    suggested_action: >-
      Extend test_exit_1_on_deletion_failure to assert
      `"ERROR: failed to delete" in result.stderr` and
      `"Failed to delete 1 of 1 files. Exit 1." in result.stderr`.
      Five-line addition. P3 / non-blocking.
    refs:
      - "python/src/the_edge_agent/cli.py:3231-3244"
      - "python/tests/test_tea_obs003_payload.py:675-709"
  - id: "TEST-LOCATION-001"
    severity: info
    finding: >-
      Test Design recommended a dedicated python/tests/test_trace_cleanup.py
      file. Implementation co-located TestCleanupHelper + TestCleanupCli
      inside test_tea_obs003_payload.py (which already hosts 003.1 and
      003.3 classes). Co-location is defensible — the three sibling
      stories share fixtures and exercise the same exporter pipeline —
      but ownership clarity for cleanup-specific regressions is
      marginally weaker.
    suggested_action: >-
      No action required. If 003.x grows further, consider splitting
      into per-story test files at that point.
    refs:
      - "python/tests/test_tea_obs003_payload.py"
      - "docs/qa/assessments/TEA-OBS-003.2-test-design-20260501.md"

