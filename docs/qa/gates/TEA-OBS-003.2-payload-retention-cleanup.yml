nfr_validation:
  _assessed: [security, performance, reliability, maintainability]
  security:
    status: PASS
    notes: >-
      Symlink-follow blocked at two layers — os.walk(followlinks=False)
      on directory descent (trace_cleanup.py:86) plus per-file
      is_symlink() check (trace_cleanup.py:100, 116) with audit-trail
      logging in skipped_symlinks. Two dedicated tests
      (test_recursive_skips_symlinked_dirs, test_symlink_to_file_not_deleted)
      verify the symlink target outside scan_root is not deleted.
      --older-than 0 rejected at helper level (trace_cleanup.py:142-146,
      172-176) and CLI level (cli.py:3193-3199). Default pattern
      ("*.llm.jsonl", "*.llm.jsonl.gz") anchored on the ".llm." infix
      cannot match a sibling spans-only file. Warning substrings
      asserted by test_retention_warning_fires (NFR-AC-19). --dry-run
      verified to perform zero unlink calls (test_dry_run_deletes_nothing).
      Promoted from CONCERNS to PASS now that AC-18 is codified +
      tested.
  performance:
    status: PASS
    notes: >-
      Cleanup is offline (cron / systemd timer, never in request path).
      Single-directory glob+stat is O(n_files); n is bounded by retention
      window × runs/day (≤30k for 1k runs/day × 30 days). Non-recursive
      default avoids accidental tree walks. PERF-001 in risk profile is
      Minimal score and accepted as residual.
  reliability:
    status: PASS
    notes: >-
      Exit codes specified and tested — exit 0 on success including
      zero matches (test_zero_matches_exits_0_with_summary), exit 1 on
      any deletion failure with per-file errors aggregated and printed
      to stderr (test_exit_1_on_deletion_failure). Cron silent-failure
      prevention codified — zero-match summary line ZERO_MATCH_SUMMARY
      = "Deleted 0 files, freed 0 MB" (test_zero_match_summary), cron
      example in docs explicitly forbids stderr redirect with inline
      comment (observability.md:204). INFO-level audit log on every
      successful deletion (trace_cleanup.py:204-209) carries path,
      size, mtime for compliance evidence. Per-file failures isolated;
      blanket errors raise. Promoted from CONCERNS to PASS now that
      AC-10 zero-match amendment + AC-15 cron-stderr sub-bullet ship
      with code.
  maintainability:
    status: PASS
    notes: >-
      Constants pinned (DEFAULT_PATTERNS, PII_RETENTION_WARNING,
      SUMMARY_FORMAT, ZERO_MATCH_SUMMARY); CleanupResult TypedDict
      pins return contract; pure helper layer (select_candidates,
      cleanup_trace_files) isolated from CLI. Standard fixture pattern
      (_aged_file with os.utime + tmp_path) used across 11 cleanup
      tests. 20 dedicated tests for cleanup; co-located with 003.1 and
      003.3 in test_tea_obs003_payload.py. AC-15 doc requirement
      satisfied by inspection (no automated grep — see DOC-SMOKE-001
      advisory).

