top_issues:
  - id: "CONCERN-1"
    severity: low
    finding: >-
      AC-3 says the FAILED dump contains "the exception traceback", but
      the implementation writes `str(event.get("error", ""))` — the
      engine emits only the exception message string in its `error`
      event (`stategraph.py:2444-2447`), not a full Python stack trace
      from `traceback.format_exc()`. The test only asserts the message
      text ("boom") is present. For deep post-mortem on a Jinja chain
      this is usually sufficient, but a multi-frame stack would be more
      useful for debugging.
    suggested_action: >-
      Future, non-blocking: capture `traceback.format_exc()` either at
      the engine error-emission site or by wrapping the run-loop's error
      branch in the CLI so the FAILED dump's `traceback` field carries a
      full stack trace. Alternatively, document explicitly in
      cli-reference.md that the field is the exception *message*, not a
      stack trace.
  - id: "CONCERN-2"
    severity: low
    finding: >-
      AC-7 (compatibility with --quiet, --stream, --show-graph) and AC-8
      (compatibility with --checkpoint) are partially exercised. Tests
      cover --debug-state with --quiet (broadly, in most tests) and
      --stream (`test_int_compatible_with_stream`). Neither --show-graph
      nor --checkpoint has a dedicated combined-flag test. The cli code
      for --debug-state is independent of those flags, so the design is
      additive, but a regression in another flag's dispatch could
      silently break the combo.
    suggested_action: >-
      Future, non-blocking: add `test_int_compatible_with_show_graph`
      and `test_int_compatible_with_checkpoint` to close the AC-7 / AC-8
      compatibility matrix.
  - id: "CONCERN-3"
    severity: low
    finding: >-
      DATA-001 (disk fill on long workflows / large states, no v1 size
      cap) is documented in cli-reference.md as accepted, but no
      follow-up story exists for `--debug-state-max-bytes`. Risk profile
      flagged this Medium and recommended tracking.
    suggested_action: >-
      Future, non-blocking: open a follow-up story for a size cap option
      (`--debug-state-max-bytes` or per-file truncation) so the
      "development-only" caveat does not remain indefinitely.
  - id: "OBSERVATION-1"
    severity: low
    finding: >-
      `_safe_node_name` and `_dump_state` are defined as closures inside
      `cli.run`. They reference `debug_state_dir` and `debug_state_step`
      from the enclosing scope. This is the chosen pattern in cli.py
      (heartbeat helpers do the same), but it made the silent-shadowing
      bug noted in the Dev Agent Record (a function-local `import re` in
      a different branch shadowed the module-level `re` for the entire
      function) hard to diagnose. The fix removed the redundant import
      and dump-writes now work in any test order.
    suggested_action: >-
      Future, non-blocking: lift `_safe_node_name` to module-level (it
      has no captured state) so a similar shadowing bug cannot recur.
      Defer `_dump_state` lifting since it captures `debug_state_dir`
      and `debug_state_step`.

