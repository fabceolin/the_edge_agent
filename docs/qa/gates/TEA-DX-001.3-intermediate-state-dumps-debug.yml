nfr_validation:
  _assessed: [security, performance, reliability, maintainability]
  security:
    status: PASS
    notes: >-
      AC-4 resolved via Option B (no state-traversal redaction; loud
      WARNING banner that survives --quiet plus --help and
      cli-reference.md wording). The codebase has no checkpoint-style
      redaction pass to reuse — `checkpoint.py:111` writes raw pickle,
      `cache.py:mask_credentials` is text-only — so Option A would have
      required building a new helper, out of scope for this story.
      AC-15 sanitizer (`[^A-Za-z0-9_-]` → `_`, max 128 chars) prevents
      path traversal via YAML node names. Verified by the dir-listing
      sanitizer test.
  performance:
    status: PASS
    notes: >-
      Default off; when set, one synchronous JSON write per
      sequential / fan-in node completion. Risk-profile TECH-002
      (sync I/O) remains Low; no observed regression in CLI tests
      (328 pass in 2.35s combined).
  reliability:
    status: PASS
    notes: >-
      Engine-event mapping pinned to `state` and `error` only;
      per-branch `parallel_state` / `parallel_error` / `branch_complete`
      events deliberately do not dump (AC-13). The fan-out parent and
      fan-in node each emit their own `state` event, so an N-branch
      parallel block produces exactly two parent dumps. AC-14 isolation
      (FAILED-write wrapped in its own try/except) verified by the
      read-only-dir test — the original node exception propagates;
      OSError from json.dump is swallowed and logged at DEBUG. The
      Click 8.1 `mix_stderr=False` fix in test_cli_heartbeat.py removes
      a cross-test interference that previously corrupted the stderr
      stream wrapper for subsequent CLI invocations in the same
      process.
  maintainability:
    status: PASS
    notes: >-
      Implementation is fully additive (single Typer flag, two
      closures, one dispatch block); no schema or API changes. Source-
      level dispatch contract test asserts the dispatcher does not
      branch on parallel_* event types — guards against future
      regressions that would re-introduce the per-branch dump bug.
      cli-reference.md gained a dedicated section + troubleshooting
      sub-section. CONCERN-1/2 above are documentation / coverage
      polish, not architecture issues.

